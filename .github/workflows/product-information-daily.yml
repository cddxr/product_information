name: Amazon Product Information Daily

on:
  workflow_dispatch:
  schedule:
    # UTC 00:00 = Asia/Shanghai 08:00
    - cron: "0 0 * * *"

jobs:
  scrape-and-send:
    runs-on: self-hosted
    timeout-minutes: 360
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      PYTHONUNBUFFERED: "1"
      HEADLESS: "1"
      CHROME_BINARY_PATH: C:\Program Files\Google\Chrome\Application\chrome.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python dependencies
        shell: cmd
        run: '"C:\Users\cddxr\AppData\Local\Programs\Python\Python313\python.exe" -c "import selenium, webdriver_manager, openpyxl, PIL, requests, dotenv"'

      - name: Scrape product information and send to Feishu
        shell: cmd
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: '"C:\Users\cddxr\AppData\Local\Programs\Python\Python313\python.exe" product_feishu.py'
